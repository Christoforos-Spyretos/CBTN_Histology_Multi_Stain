# CUDA_VISIBLE_DEVICES=0 python run_intermediate_cross_attention_classifier.py

hydra:
  searchpath:
    - /local/data1/chrsp39/CBTN_Histology_Multi_Stain/configs

defaults:
  - _self_

# -------------------------- GENERAL SETTINGS -------------------------- #
seed: 1

# -------------------------- CLASSIFICATION SETTINGS -------------------------- #
task: 5_class # 5_class, LGG_vs_HGG
n_classes: 5
label_dict:
  LGG: 0
  HGG: 1
  MB: 2
  EP: 3
  GG: 4

# -------------------------- DATA SETTINGS -------------------------- #
# CSV with all subjects and their labels
csv_path: /local/data3/chrsp39/CBTN_v2/CSVs/Merged_HE_KI67_${task}_dataset.csv

# Directories to the raw subject-level attention .pt files for each modality (pre-fusion).
# mod1 is used as query (informed by mod2). Swap mod1/mod2 to reverse the direction.
mod2_dir: /local/data3/chrsp39/CBTN_v2/SUBJECT_LEVEL_ATTENTION_HE/70%_split/${task}/features/${feature_type}/train/pt_files/fold_{fold}
mod1_dir: /local/data3/chrsp39/CBTN_v2/SUBJECT_LEVEL_ATTENTION_KI67/70%_split/${task}/features/${feature_type}/train/pt_files/fold_{fold}

patient_strat: False
shuffle: False
print_info: True
label_frac: 1.0
k: 50
k_start: -1
k_end: -1
split_dir: /local/data1/chrsp39/CBTN_Histology_Multi_Stain/models/CLAM/splits/Merged_HE_KI67_${task}_0.7_0.1_0.2_100

# -------------------------- FEATURE SETTINGS -------------------------- #
feature_type: conch_v1_5 # options: resnet50, hipt, uni, uni2-h, conch_v1, conch_v1_5
embed_dim: 512            # must match the CLAM output dim (small_clam_sb -> 512)

# -------------------------- TRAINING SETTINGS -------------------------- #
# aggregation menthod
model_type: clam_sb #options: clam_sb, clam_mb, mil, abmil
# size of model, does not affect mil, abmil
model_size: small # option: small, big 
max_epochs: 50
early_stopping: True
# early stopping minimum epochs before stopping can occur
min_epochs: 10
# early stopping patience (epochs to wait after last improvement)
patience: 5
# early stopping minimum epoch threshold
stop_epoch: 20
lr: 0.0001
lr_scheduler: cosine
opt: adamW
reg: 1e-5
use_class_weights: True
ignore: null
# debugging tool
testing: False
# enable weighted sampling
weighted_sample: False

# -------------------------- OUTPUT SETTINGS -------------------------- #
save_dir: ./results/70%_split/${task}
# ${task}_Intermediate_Fusion_CA_KI67_inform_HE_joint_${feature_type}
exp_code: ${task}_Intermediate_Fusion_CA_KI67_inform_HE_${model_size}_${model_type}_${feature_type}
log_data: True
