# CUDA_VISIBLE_DEVICES=0 python evaluate_intermediate_cross_attention_classifier.py

hydra:
  searchpath:
    - /local/data1/chrsp39/CBTN_Histology_Multi_Stain/configs

defaults:
  - _self_

# -------------------------- GENERAL SETTINGS -------------------------- #
seed: 1

# -------------------------- CLASSIFICATION SETTINGS -------------------------- #
task: 5_class # 5_class, LGG_vs_HGG
n_classes: 5
label_dict:
  LGG: 0
  HGG: 1
  MB: 2
  EP: 3
  GG: 4

# -------------------------- DATA SETTINGS -------------------------- #
csv_path: /local/data3/chrsp39/CBTN_v2/CSVs/Merged_HE_KI67_${task}_dataset.csv

# mod1 is used as query (informed by mod2). Swap mod1/mod2 to reverse the direction.
mod2_dir: /local/data3/chrsp39/CBTN_v2/SUBJECT_LEVEL_ATTENTION_HE/70%_split/${task}/features/${feature_type}/test/pt_files/fold_{fold}
mod1_dir: /local/data3/chrsp39/CBTN_v2/SUBJECT_LEVEL_ATTENTION_KI67/70%_split/${task}/features/${feature_type}/test/pt_files/fold_{fold}
k: 50
k_start: -1
k_end: -1
split_dir: /local/data1/chrsp39/CBTN_Histology_Multi_Stain/models/CLAM/splits/Merged_HE_KI67_${task}_0.7_0.1_0.2_100

# -------------------------- FEATURE SETTINGS -------------------------- #
feature_type: conch_v1_5 # options: resnet50, hipt, uni, uni2-h, conch_v1, conch_v1_5
embed_dim: 512 # small_clam_sb output dim: 512       

# -------------------------- MODEL SETTINGS -------------------------- #
models_dir: ./results/70%_split/${task}/${task}_Intermediate_Fusion_CA_KI67_inform_HE_${model_size}_${model_type}_${feature_type}_s${seed}
# aggregation menthod
model_type: clam_sb #options: clam_sb, clam_mb, mil, abmil
# size of model, does not affect mil, abmil
model_size: small # option: small, big 
ignore: null

# -------------------------- SAVING SETTINGS -------------------------- #
save_dir: ./eval_results/70%_split/${task}/EVAL_${task}_Intermediate_Fusion_CA_KI67_inform_HE_${model_size}_${model_type}_${feature_type}
exp_code: EVAL_${task}_Intermediate_Fusion_CA_KI67_inform_HE_${model_size}_${model_type}_${feature_type}
