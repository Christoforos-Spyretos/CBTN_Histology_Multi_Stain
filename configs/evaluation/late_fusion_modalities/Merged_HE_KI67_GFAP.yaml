 - /local/data3/chrsp39/CBTN_v2/${feature_type}/${late_fusion_modalities.stain1}/
 - /local/data3/chrsp39/CBTN_v2/${feature_type}/${late_fusion_modalities.stain2}/
 - /local/data3/chrsp39/CBTN_v2/${feature_type}/${late_fusion_modalities.stain3}/
