models_exp_code: 
 - ${single_stain_modality_task}_${late_fusion_modalities.stain1}_${model_size}_${model_type}_${feature_type}_s1
 - ${single_stain_modality_task}_${late_fusion_modalities.stain2}_${model_size}_${model_type}_${feature_type}_s1
 - ${single_stain_modality_task}_${late_fusion_modalities.stain3}_${model_size}_${model_type}_${feature_type}_s1
